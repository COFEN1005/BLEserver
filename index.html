<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESP32 STT Controller</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f9; padding: 20px; }
        button { 
            padding: 20px; font-size: 1.1rem; border-radius: 12px; border: none; 
            margin: 10px; width: 90%; color: white; font-weight: bold;
        }
        #connectBtn { background-color: #57606f; }
        #sttBtn { background-color: #1e90ff; height: 100px; font-size: 1.5rem; }
        .recording { background-color: #ff4757 !important; }
        #result {
            margin: 20px auto; width: 90%; min-height: 100px;
            border: 2px solid #ddd; padding: 15px; border-radius: 12px;
            background: white; font-size: 1.2rem; text-align: left;
        }
        #status { margin: 10px; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <h1>ESP32 音声入力</h1>
    
    <button id="connectBtn" onclick="connectBLE()">1. ESP32に接続</button>
    <div id="status">ステータス: 待機中</div>

    <!-- シンプルな1回クリック形式 -->
    <button id="sttBtn" onclick="handleSTTClick()">音声入力を開始</button>

    <div id="result">（ここに文字が表示されます）</div>

    <script>
        let characteristic;
        let recognition;
        let isRecognizing = false;
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        async function connectBLE() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
                document.getElementById('status').innerText = "接続完了: " + device.name;
            } catch (error) {
                alert("接続失敗: " + error);
            }
        }

        function handleSTTClick() {
            if (!isRecognizing) {
                startRecording();
            } else {
                stopAndSend();
            }
        }

        function startRecording() {
            const SpeechAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechAPI) {
                alert("非対応ブラウザです。Bluefyを使ってください。");
                return;
            }

            recognition = new SpeechAPI();
            recognition.lang = 'ja-JP';
            recognition.interimResults = true;
            recognition.continuous = true;

            recognition.onstart = () => {
                isRecognizing = true;
                const btn = document.getElementById('sttBtn');
                btn.innerText = "タップして送信";
                btn.classList.add('recording');
                document.getElementById('status').innerText = "ステータス: 録音中...";
            };

            recognition.onresult = (event) => {
                let text = "";
                for (let i = 0; i < event.results.length; i++) {
                    text += event.results[i][0].transcript;
                }
                document.getElementById('result').innerText = text;
            };

            recognition.onerror = (event) => {
                console.error("Error:", event.error);
                // エラー内容を画面に出す
                document.getElementById('status').innerText = "エラー: " + event.error;
                stopAndSend(); // エラー時は停止処理へ
            };

            recognition.start();
        }

        async function stopAndSend() {
            if (recognition) {
                recognition.stop();
            }
            isRecognizing = false;
            
            const btn = document.getElementById('sttBtn');
            btn.innerText = "音声入力を開始";
            btn.classList.remove('recording');

            const text = document.getElementById('result').innerText;
            if (text && text !== "（ここに文字が表示されます）" && characteristic) {
                try {
                    const encoder = new TextEncoder();
                    await characteristic.writeValue(encoder.encode(text));
                    document.getElementById('status').innerText = "ステータス: 送信成功！";
                } catch (e) {
                    document.getElementById('status').innerText = "ステータス: 送信失敗";
                }
            }
        }
    </script>
</body>
</html>
