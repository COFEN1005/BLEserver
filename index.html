<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESP32 STT Controller</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f9; padding-top: 20px; }
        .btn-group { margin: 10px 0; }
        button { padding: 15px; font-size: 1rem; border-radius: 8px; border: none; cursor: pointer; margin: 5px; color: white; }
        #connectBtn { background-color: #57606f; }
        #sttBtn {
            padding: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            width: 80%;
            margin-top: 20px;
            border-radius: 20px;
            transition: 0.3s;
        }
        .btn-start { background-color: #1e90ff; } /* 青：開始前 */
        .btn-stop { background-color: #ff4757; }  /* 赤：録音中 */
        #result {
            margin: 20px auto;
            width: 80%;
            min-height: 100px;
            border: 2px solid #ddd;
            padding: 15px;
            border-radius: 12px;
            background: white;
            font-size: 1.2rem;
        }
        #status { font-weight: bold; color: #333; margin: 10px; }
    </style>
</head>
<body>
    <h1>ESP32 音声入力</h1>
    
    <div class="btn-group">
        <button id="connectBtn" onclick="connectBLE()">1. ESP32に接続</button>
    </div>
    
    <div id="status">ステータス: 待機中</div>

    <!-- トグルボタンに変更 -->
    <button id="sttBtn" class="btn-start" onclick="toggleSTT()">音声入力 開始</button>

    <div id="result">（ここに文字が表示されます）</div>

    <script>
        let characteristic;
        let recognition;
        let isRecognizing = false;
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        async function connectBLE() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
                document.getElementById('status').innerText = "接続完了: " + device.name;
            } catch (error) {
                alert("BLE接続失敗: " + error);
            }
        }

        function toggleSTT() {
            if (!isRecognizing) {
                startSTT();
            } else {
                stopSTT();
            }
        }

        function startSTT() {
            const SpeechAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechAPI) {
                alert("このブラウザは音声認識非対応です");
                return;
            }

            recognition = new SpeechAPI();
            recognition.lang = 'ja-JP';
            recognition.interimResults = true;
            recognition.continuous = true;

            recognition.onstart = () => {
                isRecognizing = true;
                const btn = document.getElementById('sttBtn');
                btn.innerText = "タップして送信";
                btn.className = "btn-stop";
                document.getElementById('status').innerText = "録音中...";
            };

            recognition.onresult = (event) => {
                let text = "";
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    text += event.results[i][0].transcript;
                }
                document.getElementById('result').innerText = text;
            };

            recognition.onerror = (event) => {
                isRecognizing = false;
                alert("エラー: " + event.error);
                resetButton();
            };

            recognition.start();
        }

        async function stopSTT() {
            if (recognition) {
                recognition.stop();
            }
            isRecognizing = false;
            resetButton();
            
            const finalText = document.getElementById('result').innerText;
            if (finalText && characteristic) {
                const encoder = new TextEncoder();
                await characteristic.writeValue(encoder.encode(finalText));
                document.getElementById('status').innerText = "送信完了！";
            }
        }

        function resetButton() {
            const btn = document.getElementById('sttBtn');
            btn.innerText = "音声入力 開始";
            btn.className = "btn-start";
        }
    </script>
</body>
</html>
